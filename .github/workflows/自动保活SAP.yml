name: 自动保活 SAP

on:
  schedule:
    - cron: '15 0 * * *'     # 每天 UTC 时间 00:15 运行（北京时间 08:15）
  workflow_dispatch:  # 允许手动触发

jobs:
  restart-sg-apps:
    runs-on: ubuntu-latest
    name: Restart SG Apps
    if: always()  
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: Determine CF API endpoint
      run: |
        echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
        echo "使用API端点: $CF_API (区域: SG)"

    - name: Login to Cloud Foundry
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "${{ secrets.SG_ORG }}" -s "${{ secrets.SPACE }}"

    - name: Get all applications
      id: get-sg-apps
      run: |
        apps=$(cf apps | awk 'NR>3 {print $1}' | grep -v '^$')
        echo "发现的应用:"
        echo "$apps"
        echo "apps<<EOF" >> $GITHUB_OUTPUT
        echo "$apps" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Restart all applications
      run: |
        apps="${{ steps.get-sg-apps.outputs.apps }}"
        if [ -z "$apps" ]; then
          echo "在区域 SG 中未找到任何应用"
          exit 0
        fi
        echo "重启区域 SG 中的应用:"
        echo "$apps"
        for app in $apps; do
          echo "正在重启应用: $app"
          cf restart "$app"
          echo "应用 $app 重启成功"
          echo "----------------------------------------"
          sleep 20
        done

    - name: Verify applications status
      run: |
        echo "区域 SG 中所有应用的最终状态:"
        cf apps

    - name: Send Telegram Notification
      if: always()
      run: |
        STATUS="${{ job.status }}"
        curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
        -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
        -d text="✅ [SG区域] 应用重启任务执行完成，状态：$STATUS。"

  restart-us-apps:
    runs-on: ubuntu-latest
    name: Restart US Apps
    if: always()  
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: Determine CF API endpoint
      run: |
        echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
        echo "使用API端点: $CF_API (区域: US)"

    - name: Login to Cloud Foundry
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "${{ secrets.US_ORG }}" -s "${{ secrets.SPACE }}"

    - name: Get all applications
      id: get-us-apps
      run: |
        apps=$(cf apps | awk 'NR>3 {print $1}' | grep -v '^$')
        echo "发现的应用:"
        echo "$apps"
        echo "apps<<EOF" >> $GITHUB_OUTPUT
        echo "$apps" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Restart all applications
      run: |
        apps="${{ steps.get-us-apps.outputs.apps }}"
        if [ -z "$apps" ]; then
          echo "在区域 US 中未找到任何应用"
          exit 0
        fi
        echo "重启区域 US 中的应用:"
        echo "$apps"
        for app in $apps; do
          echo "正在重启应用: $app"
          cf restart "$app"
          echo "应用 $app 重启成功"
          echo "----------------------------------------"
          sleep 20
        done

    - name: Verify applications status
      run: |
        echo "区域 US 中所有应用的最终状态:"
        cf apps

    - name: Send Telegram Notification
      if: always()
      run: |
        STATUS="${{ job.status }}"
        curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
        -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
        -d text="✅ [US区域] 应用重启任务执行完成，状态：$STATUS。"
